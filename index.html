<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansible Project</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            overflow: hidden; /* 🔥 No scrolling */
        }

        .container {
            text-align: center;
            background: rgba(30, 41, 59, 0.9);
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 15px;
        }

        h3 {
            margin: 20px 0 10px;
            color: #22c55e;
        }

        p {
            margin: 6px 0;
            font-size: 16px;
        }

        .status {
            text-align: left;
            margin-top: 15px;
        }

        .status p {
            padding: 5px 0;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0ea5e9;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #cbd5f5;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>👻 Ansible Deployment</h1>
        <p>Server configured successfully using Ansible</p>

        <h3>✅ Tasks Completed</h3>

        <div class="status">
            <p>✔ Nginx Installed</p>
            <p>✔ Services Started</p>
            <p>✔ File Deployed</p>
            <p>✔ Permissions Set</p>
            <p>✔ Directory Created</p>
            <p>✔ User Created (suryadev)</p>
            <p>✔ Firewall Configured</p>
        </div>

        <button class="btn">View Project</button>


    </div>

</body>
</html>
